name: vonage_voice
description: "A Flutter plugin for making and receiving voice calls using the Vonage Client SDK, with native call screens (CallKit on iOS, ConnectionService on Android), background call delivery, and full in-call controls."
version: 0.0.1
homepage:
description: "Native Vonage voice calling for Flutter. Includes full background support, native call UI (CallKit/ConnectionService), and in-call controls."
version: 1.0.0

topics:
  - voip
  - telecom
  - communication

environment:
  sdk: ^3.10.8
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  # using method channels.
  # The Android 'package' specifies package in which the registered class is.
  # This is required for using method channels on Android.
  # All these are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        package: com.iocod.vonage.vonage_voice
        pluginClass: VonageVoicePlugin
      ios:
        pluginClass: VonageVoicePlugin
